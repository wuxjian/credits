<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>孩子端 - 我的积分</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #0c3483 0%, #a2b6df 50%, #6b8cce 100%); min-height:100vh; background-attachment:fixed; }
.header { background: linear-gradient(135deg, #1a56db, #4f8ef7); color:#fff; padding:12px 20px; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 15px rgba(26,86,219,0.3); border-radius:0 0 24px 24px; }
.header h1 { font-size:22px; text-shadow: 1px 1px 2px rgba(0,0,0,0.15); }
.header .nav a { color:#fff; text-decoration:none; padding:8px 16px; border-radius:20px; background:rgba(255,255,255,0.25); font-weight:600; font-size:14px; transition:all .2s; }
.header .nav a:hover { background:rgba(255,255,255,0.4); transform:scale(1.05); }
.container { max-width:600px; margin:0 auto; padding:16px; }

/* Points Display */
.points-card { background:linear-gradient(135deg, #667eea, #764ba2); border-radius:24px; padding:24px; text-align:center; margin-bottom:20px; box-shadow:0 8px 30px rgba(102,126,234,0.4); position:relative; overflow:hidden; }
.points-card::before { content:''; position:absolute; top:-30px; right:-30px; width:100px; height:100px; background:rgba(255,255,255,0.1); border-radius:50%; }
.points-card::after { content:''; position:absolute; bottom:-20px; left:-20px; width:70px; height:70px; background:rgba(255,255,255,0.08); border-radius:50%; }
.points-label { font-size:16px; color:rgba(255,255,255,0.85); margin-bottom:8px; position:relative; z-index:1; }
.points-value { font-size:56px; font-weight:900; color:#fff; text-shadow:2px 2px 4px rgba(0,0,0,0.2); position:relative; z-index:1; animation:pulse 2s ease-in-out infinite; }
.points-value .unit { font-size:22px; font-weight:400; margin-left:4px; }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }

/* Section Title */
.section-title { font-size:20px; font-weight:800; color:#1e3a5f; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-title .icon { font-size:26px; }

/* Task Grid */
.task-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* Task Cards */
.task-card { background:#fff; border-radius:20px; padding:18px 14px; display:flex; flex-direction:column; align-items:center; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.08); transition:transform .2s, box-shadow .2s; }
.task-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.12); }
.task-info { flex:1; }
.task-name { font-size:18px; font-weight:700; color:#333; margin-bottom:4px; }
.task-points { font-size:14px; color:#ff6b35; font-weight:600; }
.task-points::before { content:'\2B50 '; }
.task-badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:700; margin-top:4px; }
.badge-once { background:#e8f5e9; color:#2e7d32; }
.badge-daily { background:#fff3e0; color:#e65100; }

.complete-btn { width:100%; min-width:80px; min-height:48px; padding:12px 16px; border:none; border-radius:18px; background:linear-gradient(135deg, #43e97b, #38f9d7); color:#fff; font-size:16px; font-weight:800; cursor:pointer; transition:all .2s; box-shadow:0 4px 12px rgba(67,233,123,0.4); margin-top:10px; }
.complete-btn:hover { transform:scale(1.08); box-shadow:0 6px 18px rgba(67,233,123,0.5); }
.complete-btn:active { transform:scale(0.95); }
.complete-btn.done { background:#c0c0c0; color:#fff; cursor:not-allowed; box-shadow:none; pointer-events:none; }
.complete-btn.done:hover { transform:none; box-shadow:none; }
.task-card.completed { background:#f0f0f0; opacity:0.6; }
.task-card.completed:hover { transform:none; box-shadow:0 4px 15px rgba(0,0,0,0.08); }

/* Redeem Items */
.redeem-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.redeem-card { background:#fff; border-radius:20px; padding:18px 14px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.08); position:relative; overflow:hidden; }
.redeem-card .prize-icon { font-size:36px; margin-bottom:8px; }
.redeem-card .prize-name { font-size:16px; font-weight:700; color:#333; margin-bottom:6px; }
.redeem-card .prize-cost { font-size:13px; color:#764ba2; font-weight:600; margin-bottom:10px; }
.redeem-card .prize-cost::before { content:'\1F4B0 '; }
.redeem-btn { padding:10px 24px; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; width:100%; min-height:44px; }
.redeem-btn.enabled { background:linear-gradient(135deg, #f7971e, #ffd200); color:#fff; box-shadow:0 4px 12px rgba(247,151,30,0.4); }
.redeem-btn.enabled:hover { transform:scale(1.05); box-shadow:0 6px 18px rgba(247,151,30,0.5); }
.redeem-btn.disabled { background:#e0e0e0; color:#999; cursor:not-allowed; }
.redeem-btn.enabled:active { transform:scale(0.95); }

/* Success animation */
@keyframes celebrate { 0% { transform:scale(1); } 20% { transform:scale(1.3); } 40% { transform:scale(0.9); } 60% { transform:scale(1.15); } 80% { transform:scale(0.95); } 100% { transform:scale(1); } }
.celebrate { animation:celebrate .6s ease; }

/* Toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:14px 28px; border-radius:16px; color:#fff; font-weight:700; font-size:16px; z-index:9999; animation:toastIn .35s ease; box-shadow:0 6px 25px rgba(0,0,0,0.25); text-align:center; max-width:90vw; }
.toast-success { background:linear-gradient(135deg, #43e97b, #38f9d7); color:#1a5c2a; }
.toast-error { background:linear-gradient(135deg, #ff6b6b, #ee5a24); }
@keyframes toastIn { from { top:-60px; opacity:0; } to { top:20px; opacity:1; } }

/* Empty state */
.empty { text-align:center; color:#888; padding:24px; font-size:16px; background:rgba(255,255,255,0.6); border-radius:16px; }
.empty .empty-icon { font-size:48px; display:block; margin-bottom:8px; }

/* Confetti Particles */
.confetti { position:fixed; pointer-events:none; z-index:9998; animation:confettiFall 1s ease-out forwards; font-size:24px; }
@keyframes confettiFall { 0% { transform:translateY(0) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }

@media(max-width:400px) { .redeem-grid { grid-template-columns:1fr; } .task-grid { grid-template-columns:1fr; } .points-value { font-size:44px; } }
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F476; 我的积分小屋</h1>
</div>

<div class="container">

  <!-- Points Display -->
  <div class="points-card" id="pointsCard">
    <div class="points-label">&#x2B50; 当前积分 &#x2B50;</div>
    <div class="points-value"><span id="pointsDisplay">0</span><span class="unit">分</span></div>
  </div>

  <!-- Available Tasks -->
  <div class="section-title"><span class="icon">&#x1F4DD;</span> 今日任务</div>
  <div id="taskContainer"></div>

  <!-- Redeem Shop -->
  <div class="section-title"><span class="icon">&#x1F381;</span> 奖品商店</div>
  <div id="redeemContainer"></div>

</div>

<script>
const API = '/api';
let currentPoints = 0;

function showToast(msg, success) {
  const el = document.createElement('div');
  el.className = 'toast ' + (success ? 'toast-success' : 'toast-error');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2200);
}

function spawnConfetti(x, y) {
  const emojis = ['&#x1F389;','&#x2728;','&#x1F31F;','&#x1F308;','&#x1F38A;','&#x2B50;','&#x1F31F;'];
  for (let i=0;i<12;i++) {
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      el.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=(x+Math.random()*80-40)+'px';
      el.style.top=(y+Math.random()*20-10)+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1000);
    }, i*50);
  }
}

async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  return res.json();
}

async function loadPoints() {
  const res = await fetchJSON(API + '/points');
  if (res.success) {
    currentPoints = res.data.total_points;
    document.getElementById('pointsDisplay').textContent = currentPoints;
  }
}

async function loadTasks() {
  const res = await fetchJSON(API + '/child/tasks');
  const el = document.getElementById('taskContainer');
  if (!res.success || !res.data || res.data.length === 0) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">&#x1F3C6;</span>还没有任务哦，去找爸爸妈妈添加吧！</div>';
    return;
  }
  el.innerHTML = '<div class="task-grid">' + res.data.map(t => {
    const isDaily = t.task_type === 'daily';
    const badgeClass = isDaily ? 'badge-daily' : 'badge-once';
    const badgeText = isDaily ? '每日任务' : '一次性';
    const completed = t.completed;
    const cardExtra = completed ? ' completed' : '';
    const btnExtra = completed ? ' done' : '';
    const btnText = completed ? '\u2705 已完成' : '完成';
    const onclick = completed ? '' : 'onclick="completeTask(' + t.id + ', ' + t.points + ', \'' + t.name.replace(/'/g, "\\'") + '\', this)"';
    return '<div class="task-card' + cardExtra + '" id="task-' + t.id + '">' +
      '<div class="task-info">' +
        '<div class="task-name">' + t.name + '</div>' +
        '<div class="task-points">' + t.points + ' 积分</div>' +
        '<span class="task-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      '<button class="complete-btn' + btnExtra + '" ' + onclick + '>' + btnText + '</button>' +
    '</div>';
  }).join('') + '</div>';
}

async function completeTask(id, pts, name, btn) {
  if (!confirm('确定完成「' + name + '」吗？\n完成后可获得 ' + pts + ' 积分！')) return;
  btn.disabled = true;
  btn.textContent = '...';
  const res = await fetchJSON(API + '/child/complete-task', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({task_id: id})
  });
  if (res.success) {
    showToast(res.message, true);
    const card = document.getElementById('task-' + id);
    if (card) {
      const rect = card.getBoundingClientRect();
      spawnConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
      card.classList.add('completed');
      btn.classList.add('done');
      btn.textContent = '\u2705 已完成';
    }
    loadPoints();
  } else {
    showToast(res.message, false);
    btn.disabled = false;
    btn.textContent = '完成';
  }
}

async function loadRedeemItems() {
  const res = await fetchJSON(API + '/redeem-items');
  const el = document.getElementById('redeemContainer');
  if (!res.success || !res.data || res.data.length === 0) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">&#x1F381;</span>还没有奖品哦，去找爸爸妈妈添加吧！</div>';
    return;
  }
  el.innerHTML = '<div class="redeem-grid">' + res.data.map(item => {
    const canRedeem = currentPoints >= item.points_required;
    const btnClass = canRedeem ? 'enabled' : 'disabled';
    const btnText = canRedeem ? '&#x1F389; 兑换' : '积分不足';
    const onclick = canRedeem ? 'onclick="redeemPrize(' + item.id + ', ' + item.points_required + ', \'' + item.name.replace(/'/g, "\\'") + '\')"' : '';
    const emoji = item.points_required <= 20 ? '&#x1F3AE;' : (item.points_required <= 50 ? '&#x1F3B2;' : '&#x1F3C6;');
    return '<div class="redeem-card">' +
      '<div class="prize-icon">' + emoji + '</div>' +
      '<div class="prize-name">' + item.name + '</div>' +
      '<div class="prize-cost">' + item.points_required + ' 积分</div>' +
      '<button class="redeem-btn ' + btnClass + '" ' + onclick + '>' + btnText + '</button>' +
    '</div>';
  }).join('') + '</div>';
}

async function redeemPrize(id, cost, name) {
  if (!confirm('确定兑换「' + name + '」吗？\n将消耗 ' + cost + ' 积分！')) return;
  const res = await fetchJSON(API + '/redeem', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({item_id: id})
  });
  if (res.success) {
    showToast(res.message, true);
    spawnConfetti(window.innerWidth/2, window.innerHeight/2);
    loadPoints();
    // Re-render redeem items after points update
    setTimeout(() => loadRedeemItems(), 300);
  } else {
    showToast(res.message, false);
  }
}

// Initial load
async function init() {
  await loadPoints();
  await loadTasks();
  await loadRedeemItems();
}

// Refresh periodically
init();
setInterval(() => { loadPoints(); }, 10000);
</script>
</body>
</html>
